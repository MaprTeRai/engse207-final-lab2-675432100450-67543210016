# ── อยู่นอก server block ──
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=10r/m; # เพิ่ม rate นิดนึงเผื่อมือกดรัว
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m; # เพิ่ม rate เป็น 60 ต่อนาที

server {
    listen 80;
    server_name localhost;

    # 1. Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Auth Service (Login)
    # ใช้ prefix /api/auth/login เพื่อดักเฉพาะการ login มาทำ rate limit
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://auth-service-production-23d0.up.railway.app; # ใช้ชื่อ domain จริงของคุณ
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Auth Service (ทั่วไป)
    location /api/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth-service-production-23d0.up.railway.app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

    # ── Task Service ───────────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://task-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Log Service ────────────────────────────────────────────────
    location /api/logs/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://log-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 429 custom response ────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
    }
}