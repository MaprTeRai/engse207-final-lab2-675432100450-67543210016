# ── Rate limiting zones ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # ── Frontend (Static Files) ────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Auth Service (Login) ──────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        # แก้ตรงนี้: ใส่ Domain จริงจาก Railway Dashboard
        proxy_pass http://auth-service-production.up.railway.app/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://auth-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Task Service ───────────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://task-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Log Service ────────────────────────────────────────────────
    location /api/logs/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://log-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 429 custom response ────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
    }
}