events { worker_connections 1024; }

http {
    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # ── Frontend ──
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Auth Service ──

# 1. สำหรับ Login (แยกไว้เพราะมี Rate Limit)
location /api/auth/login {
    limit_req zone=login_limit burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://auth-service:3001/api/auth/login; # ใส่ Path เต็มไปเลย
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# 2. สำหรับ Register และอื่นๆ (สำคัญที่เครื่องหมาย /)
location /api/auth/ {
    # เติม / ต่อท้ายพอร์ต และเติม Path เป้าหมายให้ชัดเจน
    proxy_pass http://auth-service:3001/api/auth/; 
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

        # สำหรับ register และ endpoint อื่นๆ ของ auth
        location /api/auth/ {
            proxy_pass http://auth-service:3001; # ลบ .railway.internal และ / ออก
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        } 

        # ── Task Service ──
        location /api/tasks/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://task-service:3002;
            proxy_set_header Host $host;
        }

        # ── User Service ──
        location /api/users/ {
            proxy_pass http://user-service:3003;
            proxy_set_header Host $host;
        }

        # ── Log Service ──
        location /api/logs/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://log-service:3003;
            proxy_set_header Host $host;
        }

        # ── 429 custom response ──
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Too Many Requests","retryAfter":60}';
            add_header Content-Type application/json;
        }
    }
}