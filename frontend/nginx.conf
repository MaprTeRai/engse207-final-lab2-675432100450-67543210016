# ── ต้องอยู่นอก server ──
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # 1. Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    } # <--- เช็คจุดนี้ ต้องมีปีกกาปิด

    # 2. Auth Service
    location /api/auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://auth-service-production.up.railway.app/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    } # <--- เช็คจุดนี้

    # 3. Task Service
    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://task-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    } # <--- เช็คจุดนี้

    # 4. Error Pages
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
    } # <--- เช็คจุดนี้

} # <--- ปีกกาปิดท้ายสุดของ server {