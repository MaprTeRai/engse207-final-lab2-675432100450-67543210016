limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # 1. หน้าบ้าน (Static Files)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. หลังบ้าน (Auth Service)
    location /api/auth/ {
        # สำคัญมาก: ใส่ชื่อ Service หรือ Domain ของ Railway ให้ถูก
        # และเติม / ปิดท้ายทั้งคู่เพื่อให้มัน Map Path กันพอดี
        proxy_pass http://auth-service-production.up.railway.app/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ปิดการ Redirect อัตโนมัติของ Nginx
        proxy_redirect off;
    }
}

    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://task-service-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
    }
}