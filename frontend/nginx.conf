server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # แก้เป็นแบบนี้ (ลบ / ตัวสุดท้ายออกเพื่อให้มันรับทั้งแบบมีและไม่มี /)
    location /api/auth {
        # สำคัญมาก: ใส่ / ปิดท้าย URL ของ Service จริง
        proxy_pass http://auth-service-production-23d0.up.railway.app/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ป้องกัน Nginx สั่ง Redirect เอง
        proxy_redirect off;
    }
}