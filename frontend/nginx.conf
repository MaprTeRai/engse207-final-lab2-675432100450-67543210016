server {
    listen 80; # ฟังแค่พอร์ต 80 พอร์ตเดียวพอ!
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth {
        # แนะนำ: ใช้ Internal URL จากหน้า Settings ของ Auth Service ใน Railway
        # ตัวอย่าง: http://auth-service.railway.internal:3001
        proxy_pass http://<ชื่อ-internal-url-ของคุณ>; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ปิดการ Redirect ทุกชนิดที่ Nginx จะสร้างเอง
        proxy_redirect off;
    }
}