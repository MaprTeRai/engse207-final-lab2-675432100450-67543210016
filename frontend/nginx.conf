# ── Rate limiting zones ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # ── Frontend (ชี้ไปที่ไฟล์ static ในเครื่อง) ──────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Auth Service (เปลี่ยน URL เป็นของ Railway) ──────────────────────
    location /api/auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        # แก้ตรงนี้: ใส่ Domain จริงที่ได้จากหน้า Dashboard ของ auth-service
        proxy_pass http://auth-service.up.railway.app; 
        proxy_set_header Host $host;
    }

    # ── Task Service ───────────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_limit burst=20 nodelay;
        # แก้ตรงนี้: ใส่ Domain จริงที่ได้จากหน้า Dashboard ของ task-service
        proxy_pass http://task-service.up.railway.app;
        proxy_set_header Host $host;
    }

    # ... (ทำแบบเดียวกันกับ Service อื่นๆ) ...

    # ── 429 custom response ────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
    }
}