server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # เพิ่ม / หลัง auth เพื่อให้ match กับโครงสร้างโฟลเดอร์
    location /api/auth/ {
        # ใช้ Internal URL ตามที่คุณได้มาจาก Railway
        # และต้องมี / ปิดท้าย เพื่อไม่ให้ Nginx สั่ง Redirect เอง
        proxy_pass http://auth-service.railway.internal:3001; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ปิดการแก้ไข Header Location อัตโนมัติ
        proxy_redirect off;
    }
}